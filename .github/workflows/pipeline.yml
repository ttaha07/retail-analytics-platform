name: Snowflake Pipeline Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate-pipeline:
    runs-on: ubuntu-latest

    env:
      SNOWFLAKE_ACCOUNT: BIYMWRR-VX25070
      SNOWFLAKE_USER: TAHA
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_WAREHOUSE: RETAIL_WH
      SNOWFLAKE_DATABASE: RETAIL_ANALYTICS_DB
      SNOWFLAKE_SCHEMA: GOLD

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Compile Python files
        run: |
          python -m py_compile orchestration/pipeline.py
          python -m py_compile tests/data_quality_checks.py

      - name: Run Snowflake pipeline
        run: |
          python orchestration/pipeline.py

      - name: Run data quality tests
        run: |
          pytest tests/data_quality_checks.py -v