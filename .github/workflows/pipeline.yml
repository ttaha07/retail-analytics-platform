name: Retail Analytics Pipeline CI/CD

on:
  push:
    branches: [ main ]

jobs:
  run-etl-pipeline:

    runs-on: ubuntu-latest

    steps:

      # STEP 1 - Checkout repo
      - name: Checkout Repository
        uses: actions/checkout@v4

      # STEP 2 - Install SQLite (needed to run SQL files)
      - name: Install SQLite
        run: |
          sudo apt-get update
          sudo apt-get install sqlite3 -y

      # STEP 3 - Create database file
      - name: Initialize Database
        run: |
          touch warehouse.db

      # =========================
      # BRONZE LAYER
      # =========================
      - name: Run Bronze Layer SQL
        run: |
          echo "Running Bronze Layer..."
          sqlite3 warehouse.db < sql/bronze/create_tables.sql
          sqlite3 warehouse.db < sql/bronze/load_data.sql
          sqlite3 warehouse.db < sql/bronze/validation.sql

      # =========================
      # SILVER LAYER
      # =========================
      - name: Run Silver Layer SQL
        run: |
          echo "Running Silver Layer..."
          sqlite3 warehouse.db < sql/silver/create_silver_tables.sql
          sqlite3 warehouse.db < sql/silver/load_silver_tables.sql
          sqlite3 warehouse.db < sql/silver/validation.sql

      # =========================
      # GOLD LAYER
      # =========================
      - name: Run Gold Layer SQL
        run: |
          echo "Running Gold Layer..."
          sqlite3 warehouse.db < sql/gold/create_fact_table.sql
          sqlite3 warehouse.db < sql/gold/create_dimensions.sql
          sqlite3 warehouse.db < sql/gold/validation.sql

      # =========================
      # DATA QUALITY CHECKS (Python)
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Run Data Quality Tests
        run: |
          python tests/data_quality_checks.py

      # =========================
      # UPLOAD ARTIFACTS (PROOF)
      # =========================
      - name: Upload Database Artifact
        uses: actions/upload-artifact@v4
        with:
          name: warehouse-database
          path: warehouse.db

      - name: Upload Logs
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs
          path: .