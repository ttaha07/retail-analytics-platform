name: Retail Analytics CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
  SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
  SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
  SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
  SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
  SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dbt.txt ]; then pip install -r requirements-dbt.txt; fi

      - name: Python syntax check
        run: python -m compileall orchestration scripts tests

      - name: Build Docker image
        run: docker build -t retail-analytics-pipeline .

      - name: Run Snowflake pipeline
        if: ${{ env.SNOWFLAKE_ACCOUNT != '' }}
        run: python orchestration/pipeline.py

      - name: Run data quality checks
        if: ${{ env.SNOWFLAKE_ACCOUNT != '' }}
        run: pytest tests/data_quality_checks.py -v -p no:cacheprovider