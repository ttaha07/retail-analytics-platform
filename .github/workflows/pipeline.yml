name: Data Pipeline CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install pandas

    - name: Run pipeline
      run: |
        python orchestration/pipeline.py

    - name: Run tests
      run: |
        python tests/data_quality_checks.py