- name: Install SQLite
  run: sudo apt-get install sqlite3 -y

- name: Run Bronze SQL
  run: |
    sqlite3 database.db < sql/bronze/create_tables.sql
    sqlite3 database.db < sql/bronze/load_data.sql
    sqlite3 database.db < sql/bronze/validation.sql
    
  - name: Run Silver SQL
  run: |
    sqlite3 database.db < sql/silver/create_silver_tables.sql
    sqlite3 database.db < sql/silver/load_silver_tables.sql
    sqlite3 database.db < sql/silver/validation.sql

- name: Run Gold SQL
  run: |
    sqlite3 database.db < sql/gold/create_fact_table.sql
    sqlite3 database.db < sql/gold/create_dimensions.sql
    sqlite3 database.db < sql/gold/validation.sql