name: Retail Analytics Snowflake Pipeline CI/CD

on:
  push:
    branches: [ main ]

jobs:
  run-snowflake-etl:
    runs-on: ubuntu-latest

    steps:

      # STEP 1 - Checkout repo
      - name: Checkout Repository
        uses: actions/checkout@v4

      # STEP 2 - Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # STEP 3 - Install dependencies
      - name: Install dependencies
        run: |
          pip install snowflake-connector-python pandas

      # STEP 4 - Run Bronze Layer
      - name: Run Bronze Layer
        env:
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
        run: |
          python sql/bronze/run_bronze.py

      # STEP 5 - Run Silver Layer
      - name: Run Silver Layer
        env:
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
        run: |
          python sql/silver/run_silver.py

      # STEP 6 - Run Gold Layer
      - name: Run Gold Layer
        env:
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
        run: |
          python sql/gold/run_gold.py

      # STEP 7 - Run Data Quality Checks
      - name: Run Data Quality Tests
        run: |
          python tests/data_quality_checks.py

      # STEP 8 - Upload logs
      - name: Upload Logs
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs
          path: logs/